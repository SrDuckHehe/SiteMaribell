<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nossa Galeria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>

    /* ── PAGE HEADER ── */
    .gallery-header {
      padding: 3rem 2rem 1.5rem;
      text-align: center;
      background: var(--white);
      border-bottom: 1px solid rgba(0,0,0,.07);
    }

    .gallery-header .back-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-family: 'Montserrat', sans-serif;
      font-size: .58rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--gray);
      margin-bottom: 2rem;
      transition: color .2s;
    }
    .gallery-header .back-link:hover { color: var(--black); }
    .gallery-header .back-link svg { width: 12px; height: 12px; }

    .gallery-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      font-style: italic;
      color: var(--black);
      margin-bottom: .8rem;
    }

    .gallery-header p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--gray);
      max-width: 480px;
      margin: 0 auto 1.5rem;
      line-height: 1.7;
    }

    .gallery-header .photo-count {
      font-family: 'Montserrat', sans-serif;
      font-size: .58rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ── MOSAIC GRID ── */
    .mosaic {
      padding: 2.5rem 1.5rem 4rem;
      background: var(--white);
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Grid de 4 colunas com rows automáticos */
    .mosaic-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 160px;
      gap: 6px;
    }

    /* ── CÉLULAS BASE ── */
    .mosaic-cell {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: #d8d3cc;
    }

    .mosaic-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .55s ease, filter .4s ease;
      filter: saturate(.9) contrast(1.02);
    }

    .mosaic-cell:hover img {
      transform: scale(1.05);
      filter: saturate(1.05) contrast(1.05);
    }

    /* overlay sutil no hover */
    .mosaic-cell::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background .35s ease;
    }
    .mosaic-cell:hover::after {
      background: rgba(0,0,0,.08);
    }

    /* ── TAMANHOS (spans) ── */
    /* Célula alta: ocupa 2 linhas */
    .cell-tall   { grid-row: span 2; }
    /* Célula larga: ocupa 2 colunas */
    .cell-wide   { grid-column: span 2; }
    /* Célula grande: 2×2 */
    .cell-big    { grid-column: span 2; grid-row: span 2; }

    /* placeholder quando não tem foto */
    .mosaic-cell.empty {
      background: linear-gradient(135deg, #e8e3dc, #d5cfc7);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: .5rem;
      cursor: default;
    }
    .mosaic-cell.empty svg { opacity: .2; }
    .mosaic-cell.empty span {
      font-family: 'Montserrat', sans-serif;
      font-size: .5rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(0,0,0,.3);
    }
    .mosaic-cell.empty:hover img { transform: none; }
    .mosaic-cell.empty::after { display: none; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,.95);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 2px;
      box-shadow: 0 20px 80px rgba(0,0,0,.6);
      transform: scale(.95);
      transition: transform .35s ease;
    }
    .lightbox.open img { transform: scale(1); }

    .lightbox-close {
      position: absolute;
      top: 1.5rem; right: 1.5rem;
      background: none; border: none;
      color: rgba(255,255,255,.6);
      font-size: 1.8rem;
      cursor: pointer;
      line-height: 1;
      padding: .4rem;
      transition: color .2s;
    }
    .lightbox-close:hover { color: var(--white); }

    .lightbox-nav {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: rgba(255,255,255,.4);
      font-size: 2rem;
      cursor: pointer;
      padding: 1rem;
      transition: color .2s;
      user-select: none;
    }
    .lightbox-nav:hover { color: var(--white); }
    .lightbox-prev { left: 1rem; }
    .lightbox-next { right: 1rem; }

    .lightbox-counter {
      position: absolute;
      bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-family: 'Montserrat', sans-serif;
      font-size: .55rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
    }

    /* ── FOOTER DA GALERIA ── */
    .gallery-footer {
      background: var(--black);
      text-align: center;
      padding: 2.5rem;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .gallery-footer p {
      font-family: 'Great Vibes', cursive;
      font-size: 2rem;
      color: rgba(255,255,255,.25);
    }

    /* ── RESPONSIVO ── */
    @media (max-width: 700px) {
      .mosaic-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: 140px;
        gap: 4px;
      }
      /* em mobile, remove os spans grandes para não quebrar */
      .cell-big  { grid-column: span 1; grid-row: span 2; }
      .cell-wide { grid-column: span 2; }
      .cell-tall { grid-row: span 2; }

      .mosaic { padding: 1rem .75rem 3rem; }
      .lightbox-nav { font-size: 1.4rem; padding: .6rem; }
    }

    @media (max-width: 400px) {
      .mosaic-grid { grid-auto-rows: 120px; gap: 3px; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="gallery-header">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 2L4 6l4 4"/>
      </svg>
      Voltar
    </a>
    <h1>Nossa Galeria</h1>
    <p>Cada foto guarda um momento que não quero esquecer nunca.</p>
    <p class="photo-count" id="photo-count">— memórias —</p>
  </header>

  <!-- ── MOSAICO ── -->
  <main class="mosaic">
    <div class="mosaic-grid" id="mosaic-grid">

      <!--
        COMO ADICIONAR FOTOS:
        Substitua cada <div class="mosaic-cell empty"> por:
        <div class="mosaic-cell [tamanho]">
          <img src="image/SuaFoto.jpg" alt="descrição">
        </div>

        Tamanhos disponíveis:
          (sem classe extra) → quadrado normal
          cell-tall          → foto alta (2 linhas)
          cell-wide          → foto larga (2 colunas)
          cell-big           → foto grande (2×2)
      -->

      <div class="mosaic-cell cell-tall">
        <img src="image/Foto01.webp" alt="foto 1">
      </div>

      <div class="mosaic-cell cell-big">
        <img src="image/Foto02.webp" alt="foto 2">
      </div>

      <div class="mosaic-cell">
        <img src="image/Foto03.webp" alt="foto 3">
      </div>

      <div class="mosaic-cell">
        <img src="image/Foto04.webp" alt="foto 4">
      </div>

      <div class="mosaic-cell cell-wide">
        <img src="image/Foto05.webp" alt="foto 5">
      </div>

      <!-- A partir daqui: placeholders — troque por <img> quando tiver as fotos -->

      <div class="mosaic-cell cell-tall">
        <img src="image/Foto07.webp" alt="foto 6">
      </div>

      <div class="mosaic-cell cell-tall">
        <img src="image/Foto07.webp" alt="foto 7" loading="lazy">
      </div>

      <div class="mosaic-cell cell-tall">
        <img src="image/Foto08.webp" alt="foto 8" loading="lazy">
      </div>

      <div class="mosaic-cell cell-wide">
        <img src="image/Foto09.webp" alt="foto 9" loading="lazy">
      </div>

      <div class="mosaic-cell">
        <img src="image/Foto11.webp" alt="foto 10" loading="lazy">
      </div>

      <div class="mosaic-cell">
        <img src="image/Foto12.webp" alt="foto 11" loading="lazy">
      </div>

      <div class="mosaic-cell cell-big">
        <img src="image/Foto13.webp" alt="foto 12" loading="lazy">
      </div>

      <div class="mosaic-cell">
        <img src="image/Foto14.webp" alt="foto 13" loading="lazy">
      </div>

      <div class="mosaic-cell">
        <img src="image/Foto15.webp" alt="foto 14" loading="lazy">
      </div>

      <div class="mosaic-cell cell-tall">
        <img src="image/Foto16.webp" alt="foto 15" loading="lazy">
      </div>

      <div class="mosaic-cell">
        <img src="image/FOTOFOTO.webp" alt="foto 16" loading="lazy">
      </div>

    </div>
  </main>

  <!-- ── LIGHTBOX ── -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lb-close" aria-label="Fechar">×</button>
    <button class="lightbox-nav lightbox-prev" id="lb-prev" aria-label="Anterior">‹</button>
    <img id="lb-img" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lb-next" aria-label="Próxima">›</button>
    <p class="lightbox-counter" id="lb-counter"></p>
  </div>

  <!-- ── FOOTER ── -->
  <footer class="gallery-footer">
    <p>cada clique, uma memória nossa.</p>
  </footer>

  <script>
    // ── Lightbox ──────────────────────────────
    const cells   = [...document.querySelectorAll('.mosaic-cell:not(.empty)')];
    const photos  = cells.map(c => c.querySelector('img').src);
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');
    let current = 0;

    // contador de fotos reais
    document.getElementById('photo-count').textContent =
      `— ${photos.length} memória${photos.length !== 1 ? 's' : ''} —`;

    function openLightbox(index) {
      current = index;
      lbImg.src = photos[current];
      lbCounter.textContent = `${current + 1} / ${photos.length}`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      current = (current + dir + photos.length) % photos.length;
      lbImg.src = photos[current];
      lbCounter.textContent = `${current + 1} / ${photos.length}`;
    }

    cells.forEach((cell, i) => {
      cell.addEventListener('click', () => openLightbox(i));
    });

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
    document.getElementById('lb-next').addEventListener('click', () => navigate(1));

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   navigate(-1);
      if (e.key === 'ArrowRight')  navigate(1);
    });

    // ── Fade-up nas células ───────────────────
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.style.opacity = '1';
          e.target.style.transform = 'translateY(0)';
        }
      });
    }, { threshold: 0.05 });

    document.querySelectorAll('.mosaic-cell').forEach((cell, i) => {
      cell.style.opacity = '0';
      cell.style.transform = 'translateY(16px)';
      cell.style.transition = `opacity .6s ease ${i * 0.04}s, transform .6s ease ${i * 0.04}s`;
      observer.observe(cell);
    });
  </script>
</body>
</html>
